name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type publish to release packages.
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirm == 'publish' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install package dependencies
        run: |
          npm ci --ignore-scripts
          npm --prefix packages/validator ci --ignore-scripts
          npm --prefix packages/action ci --ignore-scripts
          npm --prefix packages/readback ci --ignore-scripts

      - name: Validate release candidate
        run: |
          npm test
          npm run workflow:check
          npm run validate:starters
          npm run release:check
          npm run pack:dry-run
          npm run registry:readback
          npm run install:smoke
          npm run urls:check
          npm run release:go-no-go
          node -e "const d=require('./docs/release-go-no-go.json'); const scopes=['decision','uploaderPublicationDecision','parserVariantPublicationDecision','catalogDownloadPublicationDecision']; const blocked=scopes.filter((k)=>((k==='decision'?d:d[k])?.decision)!=='go'); if(blocked.length){throw new Error('publish requires GO decisions for: '+blocked.join(', '));}"
          npm audit --omit=dev
          npm --prefix packages/validator audit --omit=dev
          npm --prefix packages/action audit --omit=dev
          npm --prefix packages/readback audit --omit=dev
          python -m pip install --requirement .github/requirements-ci.txt
          python -m detect_secrets scan --all-files --exclude-files '(\.git/|\.git\\|node_modules/|node_modules\\)'

      - name: Check published package versions
        id: package_status
        run: |
          set -euo pipefail

          check_package() {
            local output_name="$1"
            local package_name="$2"
            local package_dir="$3"
            local version

            version="$(node -p "require('./${package_dir}/package.json').version")"

            if npm view "$package_name@$version" version --json >/dev/null 2>&1; then
              echo "$package_name@$version already published."
              echo "${output_name}_exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "$package_name@$version is not published yet."
              echo "${output_name}_exists=false" >> "$GITHUB_OUTPUT"
            fi
          }

          check_package schemas @agentique.io/schemas schemas
          check_package validator @agentique.io/validator packages/validator
          check_package action @agentique.io/action packages/action
          check_package readback @agentique.io/readback packages/readback
          check_package uploader @agentique.io/uploader packages/uploader

      - name: Publish schemas package
        if: ${{ steps.package_status.outputs.schemas_exists != 'true' }}
        working-directory: schemas
        run: npm publish --access public --provenance

      - name: Publish validator package
        if: ${{ steps.package_status.outputs.validator_exists != 'true' }}
        working-directory: packages/validator
        run: npm publish --access public --provenance

      - name: Publish action package
        if: ${{ steps.package_status.outputs.action_exists != 'true' }}
        working-directory: packages/action
        run: npm publish --access public --provenance

      - name: Publish readback package
        if: ${{ steps.package_status.outputs.readback_exists != 'true' }}
        working-directory: packages/readback
        run: npm publish --access public --provenance

      - name: Verify uploader dependency versions after companion publish
        run: |
          set -euo pipefail

          wait_for_package() {
            local package_name="$1"
            local package_dir="$2"
            local version

            version="$(node -p "require('./${package_dir}/package.json').version")"

            for attempt in {1..30}; do
              if npm view "$package_name@$version" version --json >/dev/null 2>&1; then
                echo "$package_name@$version is readable from npm."
                return 0
              fi

              echo "Waiting for $package_name@$version npm readback ($attempt/30)."
              sleep 10
            done

            echo "$package_name@$version was not readable from npm after waiting." >&2
            return 1
          }

          wait_for_package @agentique.io/readback packages/readback
          wait_for_package @agentique.io/validator packages/validator

      - name: Verify uploader package dependencies
        run: |
          npm --prefix packages/uploader ci --ignore-scripts
          npm --prefix packages/uploader audit --omit=dev

      - name: Publish uploader package
        if: ${{ steps.package_status.outputs.uploader_exists != 'true' }}
        working-directory: packages/uploader
        run: npm publish --access public --provenance

      - name: Wait for published package readback
        run: |
          set -euo pipefail

          wait_for_package() {
            local package_name="$1"
            local package_dir="$2"
            local version

            version="$(node -p "require('./${package_dir}/package.json').version")"

            for attempt in {1..30}; do
              if npm view "$package_name@$version" version --json >/dev/null 2>&1; then
                echo "$package_name@$version is readable from npm."
                return 0
              fi

              echo "Waiting for $package_name@$version npm readback ($attempt/30)."
              sleep 10
            done

            echo "$package_name@$version was not readable from npm after waiting." >&2
            return 1
          }

          wait_for_package @agentique.io/schemas schemas
          wait_for_package @agentique.io/validator packages/validator
          wait_for_package @agentique.io/action packages/action
          wait_for_package @agentique.io/readback packages/readback
          wait_for_package @agentique.io/uploader packages/uploader

      - name: Verify published package set
        env:
          AGENTIQUE_REGISTRY_MODE: published
          AGENTIQUE_INSTALL_SMOKE_MODE: registry
        run: |
          npm run registry:readback
          npm run install:smoke
