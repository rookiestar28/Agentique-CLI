name: Release Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install package dependencies
        run: |
          npm ci --ignore-scripts
          npm --prefix packages/validator ci --ignore-scripts
          npm --prefix packages/action ci --ignore-scripts
          npm --prefix packages/readback ci --ignore-scripts
          npm --prefix packages/uploader ci --ignore-scripts

      - name: Run package tests
        run: |
          npm test
          npm audit --omit=dev
          npm --prefix packages/validator audit --omit=dev
          npm --prefix packages/action audit --omit=dev
          npm --prefix packages/readback audit --omit=dev
          npm --prefix packages/uploader audit --omit=dev

      - name: Run release allowlist and content checks
        run: |
          npm run validate:starters
          npm run workflow:check
          npm run pack:dry-run
          npm run registry:readback
          npm run install:smoke
          npm run urls:check
          npm run release:go-no-go
          node scripts/release-check.mjs .

      - name: Run secret scan
        run: |
          python -m pip install --requirement .github/requirements-ci.txt
          python -m detect_secrets scan --all-files --exclude-files '(\.git/|\.git\\|node_modules/|node_modules\\)'
